<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLP Click Test</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
    }

    table {
        border-collapse: collapse;
        width: 60%;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
    }

    th {
        background-color: #f2f2f2;
    }

    button {
        padding: 6px 12px;
        cursor: pointer;
    }
</style>

<script>
function rowAction(text) {
    alert("Button clicked for row containing: " + text);
}
</script>

</head>

<body>

<h2>Test Table</h2>
<p>Find the row containing <b>"test data"</b> and click the element in that row.</p>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr>
<td>1</td>
<td>Sample</td>
<td>normal data</td>
<td><button onclick="rowAction('normal data')">Click</button></td>
</tr>

<tr>
<td>2</td>
<td>Testing</td>
<td>test data example</td>
<td><button onclick="rowAction('test data')">Click</button></td>
</tr>

<tr>
<td>3</td>
<td>Demo</td>
<td>other value</td>
<td><button onclick="rowAction('other value')">Click</button></td>
</tr>

</tbody>
</table>

</body>
</html>
